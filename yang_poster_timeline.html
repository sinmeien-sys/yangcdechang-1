*{box-sizing:border-box;margin:0;padding:0}
body{background:#0F0E0C;min-height:100vh;font-family:"PingFang SC","Microsoft YaHei",sans-serif;padding:40px 20px;display:flex;align-items:center;justify-content:center}
.outer{background:#1C1A16;border-radius:14px;padding:40px 36px 36px;max-width:1100px;width:100%}
.top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:36px;flex-wrap:wrap;gap:16px}

.grid{display:grid;grid-template-columns:repeat(18,1fr);gap:6px}
.cell{position:relative;aspect-ratio:2/3;border-radius:4px;overflow:hidden;transition:transform .25s ease,box-shadow .25s ease}

.cell.film:hover{transform:scale(1.12) translateY(-6px);box-shadow:0 16px 36px rgba(0,0,0,0.7);z-index:5}
.year-row{display:grid;grid-template-columns:repeat(18,1fr);gap:6px;margin-top:10px}
.year-label{text-align:center;font-size:10px;color:#5A5450;font-feature-settings:"tnum"}
.year-label.empty{color:#2E2C28}
.detail{margin-top:32px;background:#252320;border-radius:10px;padding:24px;border:0.5px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:24px;transition:opacity .3s;min-height:160px}
.detail.empty{opacity:.4}

.d-info h3{font-size:20px;font-weight:500;color:#E8E2D6;margin-bottom:6px;letter-spacing:.02em}
.d-info .en{font-size:12px;color:#7A7268;margin-bottom:10px;letter-spacing:.06em;font-style:italic}
.d-info .meta{font-size:12px;color:#7A7268;margin-bottom:8px;letter-spacing:.08em}
.d-info .note{font-size:13px;color:#9A9288;line-height:1.7}
.d-info .cum{font-size:11px;color:#B8967A;margin-top:10px;letter-spacing:.08em}
.bottom-note{font-size:11px;color:#3A3630;margin-top:20px;letter-spacing:.08em;text-align:right}

const years=[];for(let y=1983;y<=2000;y++)years.push(String(y));
let cum=0;const cumMap={};years.forEach(y=>{if(films[y])cum++;cumMap[y]=cum});

const grid=document.getElementById('grid');
const yearRow=document.getElementById('years');
years.forEach(y=>{
  const hasFilm=!!films[y];
  const cell=document.createElement('div');
  cell.className='cell '+(hasFilm?'film':'empty');
  if(hasFilm){
    cell.style.backgroundImage=`url(${posters[y]})`;
    cell.addEventListener('mouseenter',()=>show(y));
    cell.addEventListener('click',()=>show(y));
  }
  grid.appendChild(cell);
  const lbl=document.createElement('div');
  lbl.className='year-label'+(hasFilm?'':' empty');
  lbl.textContent=y.slice(-2);
  yearRow.appendChild(lbl);
});

function show(y){
  const f=films[y];if(!f)return;
  document.getElementById('detail').classList.remove('empty');
  document.getElementById('d-poster').style.backgroundImage=`url(${posters[y]})`;
  document.getElementById('d-title').textContent=f.full;
  document.getElementById('d-en').textContent=f.en;
  document.getElementById('d-meta').textContent=y+' 年';
  document.getElementById('d-note').textContent=f.note;
  document.getElementById('d-cum').textContent='累计第 '+cumMap[y]+' 部';
}
</script>
