<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>杨德昌电影 · 年份分布直方图</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0F0E0C;min-height:100vh;font-family:"PingFang SC","Microsoft YaHei",sans-serif;padding:40px 20px;display:flex;align-items:center;justify-content:center}
.outer{background:#1C1A16;border-radius:14px;padding:36px 36px 32px;max-width:1100px;width:100%}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:28px}
.mc{background:#252320;border-radius:10px;padding:14px 16px;border:0.5px solid rgba(255,255,255,0.06)}
.mc-l{font-size:11px;color:#5A5450;margin-bottom:4px;letter-spacing:.04em}
.mc-v{font-size:22px;font-weight:500;color:#E8E2D6}
.mc-s{font-size:11px;color:#5A5450;margin-top:2px}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.htitle{font-size:12px;color:#5A5450;letter-spacing:.1em}
.leg{display:flex;gap:18px;font-size:11px;color:#5A5450}
.leg span{display:flex;align-items:center;gap:6px}
.lsq{width:8px;height:8px;border-radius:1px}
.lln{width:18px;height:0;border-top:1.5px dashed #B8967A}
.cwrap{position:relative;height:340px}
canvas{display:block;width:100%;height:100%}
.tip{background:#2A2720;color:#E8E2D6;border:0.5px solid rgba(232,226,214,0.12);font-size:12px;line-height:1.7;padding:10px 14px;border-radius:8px;pointer-events:none;position:absolute;display:none;white-space:nowrap;z-index:10}
.note{font-size:10px;color:#3A3630;margin-top:14px;letter-spacing:.08em;text-align:right}
</style>
</head>
<body>
<div class="outer">
  <div class="metrics">
    <div class="mc"><div class="mc-l">创作生涯</div><div class="mc-v">18年</div><div class="mc-s">1983–2000</div></div>
    <div class="mc"><div class="mc-l">长片作品</div><div class="mc-v">7部</div><div class="mc-s">每部平均2.6年</div></div>
    <div class="mc"><div class="mc-l">最长间隔</div><div class="mc-v">5年</div><div class="mc-s">1986→1991</div></div>
    <div class="mc"><div class="mc-l">收官之作</div><div class="mc-v">《一一》</div><div class="mc-s">坎城最佳导演</div></div>
  </div>
  <div class="hdr">
    <span class="htitle">作品年份分布 + 累计数量</span>
    <div class="leg">
      <span><span class="lsq" style="background:#7A8C9A"></span>年度作品</span>
      <span><span class="lln"></span>累计作品数</span>
    </div>
  </div>
  <div class="cwrap">
    <canvas id="hc"></canvas>
    <div class="tip" id="tip"></div>
  </div>
  <div class="note">悬停柱子查看影片详情</div>
</div>
<script>
(function(){
  const sources=[
    'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js',
    'https://unpkg.com/chart.js@4.4.1/dist/chart.umd.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js',
    'https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.1/chart.umd.js'
  ];
  let i=0;
  function tryLoad(){
    if(i>=sources.length){alert('Chart.js 加载失败，请检查网络');return;}
    const s=document.createElement('script');
    s.src=sources[i];
    s.onload=()=>{if(window.Chart)initChart();else{i++;tryLoad();}};
    s.onerror=()=>{i++;tryLoad();};
    document.head.appendChild(s);
  }
  tryLoad();
  window.initChart=initChart;
})();

function initChart(){
const films = {
  "1983": {
    "full": "《海滩的一天》",
    "en": "That Day, on the Beach",
    "note": "首部独立长片 · 现代主义叙事"
  },
  "1985": {
    "full": "《青梅竹马》",
    "en": "Taipei Story",
    "note": "城市疏离 · 侯孝贤主演"
  },
  "1986": {
    "full": "《恐怖分子》",
    "en": "The Terrorizers",
    "note": "台湾新浪潮里程碑"
  },
  "1991": {
    "full": "《牯岭街少年杀人事件》",
    "en": "A Brighter Summer Day",
    "note": "4小时史诗 · 集体记忆"
  },
  "1994": {
    "full": "《独立时代》",
    "en": "A Confucian Confusion",
    "note": "都市群像 · 中产批判"
  },
  "1996": {
    "full": "《麻将》",
    "en": "Mahjong",
    "note": "青年迷失 · 价值真空"
  },
  "2000": {
    "full": "《一一》",
    "en": "Yi Yi",
    "note": "坎城最佳导演 · 生命三段式"
  }
};
const allYears=[];for(let y=1983;y<=2000;y++)allYears.push(String(y));
const counts=allYears.map(y=>films[y]?1:0);
let c=0;const cum=allYears.map(y=>{c+=(films[y]?1:0);return c;});

new Chart(document.getElementById('hc'),{
  data:{labels:allYears,datasets:[
    {type:'bar',label:'年度作品',data:counts,
      backgroundColor:allYears.map(y=>films[y]?'rgba(122,140,154,0.85)':'rgba(122,140,154,0.06)'),
      borderColor:allYears.map(y=>films[y]?'rgba(152,170,184,0.5)':'transparent'),
      borderWidth:0.5,borderRadius:2,yAxisID:'y',order:2},
    {type:'line',label:'累计',data:cum,
      borderColor:'rgba(184,150,122,0.7)',borderWidth:1.5,borderDash:[4,4],
      pointBackgroundColor:allYears.map(y=>films[y]?'#B8967A':'transparent'),
      pointBorderColor:allYears.map(y=>films[y]?'#B8967A':'transparent'),
      pointRadius:allYears.map(y=>films[y]?4:0),pointHoverRadius:6,
      tension:0.3,fill:false,yAxisID:'y2',order:1}
  ]},
  options:{responsive:true,maintainAspectRatio:false,
    layout:{padding:{top:8}},
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:false},
      tooltip:{enabled:false,external(ctx){
        const tip=document.getElementById('tip');
        if(ctx.tooltip.opacity===0){tip.style.display='none';return;}
        const lbl=ctx.tooltip.dataPoints?.[0]?.label;
        if(!films[lbl]){tip.style.display='none';return;}
        const f=films[lbl];
        const tp=ctx.tooltip;
        const rect=ctx.chart.canvas.getBoundingClientRect();
        tip.style.display='block';
        tip.style.left=(tp.caretX+14)+'px';
        tip.style.top=(tp.caretY-14)+'px';
        tip.innerHTML='<span style="color:#E8E2D6;font-weight:500">'+f.full+'</span> <span style="color:#4A4640">'+lbl+'</span><br><span style="color:#5A5450;font-size:11px">'+f.note+'</span><br><span style="color:#B8967A">累计 '+cum[allYears.indexOf(lbl)]+' 部</span>';
      }}
    },
    scales:{
      x:{ticks:{color:'#4A4640',font:{size:11},autoSkip:false,maxRotation:0,
        callback:(v,i)=>films[allYears[i]]?allYears[i]:''},
        grid:{color:'rgba(255,255,255,0.04)'},border:{color:'rgba(255,255,255,0.08)'}},
      y:{position:'left',min:0,max:1.2,
        title:{display:true,text:'年度作品数',color:'#4A4640',font:{size:11}},
        ticks:{color:'#4A4640',stepSize:1,callback:v=>v<=1&&Number.isInteger(v)?v:''},
        grid:{color:'rgba(255,255,255,0.04)'},border:{color:'rgba(255,255,255,0.08)'}},
      y2:{position:'right',min:0,max:7.5,
        title:{display:true,text:'累计作品数',color:'#4A4640',font:{size:11}},
        ticks:{color:'#4A4640',stepSize:1,callback:v=>v<=7?v:''},
        grid:{drawOnChartArea:false},border:{color:'rgba(255,255,255,0.08)'}}
    }
  }
});
}
</script>
</body>
</html>
