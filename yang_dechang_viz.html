<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8">
<title>杨德昌电影 — 可视化</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2/dist/echarts-wordcloud.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #E8E5DE;
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: #3A3832;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────── */
  .page-header {
    padding: 28px 36px 18px;
    border-bottom: 0.5px solid rgba(80,70,60,0.2);
    display: flex;
    align-items: baseline;
    gap: 18px;
  }
  .page-header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: #2B2923;
  }
  .page-header .sub {
    font-size: 12px;
    font-weight: 300;
    color: #7A7268;
    letter-spacing: 0.06em;
  }

  /* ── Grid ────────────────────────────────── */
  #container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 14px;
    padding: 14px 20px 20px;
  }

  .panel {
    background: #F2EFE8;
    border-radius: 14px;
    border: 0.5px solid rgba(80,70,60,0.18);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel-title {
    padding: 14px 20px 0;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: #7A7268;
    text-transform: uppercase;
  }

  .panel-note {
    padding: 2px 20px 10px;
    font-size: 10.5px;
    color: #9A9288;
    font-weight: 300;
  }

  .chart-wrap {
    flex: 1;
    min-height: 0;
  }

  #pie-panel   { height: 380px; }
  #cloud-panel { height: 380px; }
  #graph-panel { grid-column: 1 / 3; height: 500px; }

  /* ── Legend strip for graph ─────────────── */
  .legend-strip {
    display: flex;
    gap: 20px;
    padding: 0 20px 12px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #7A7268;
    font-weight: 300;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>杨德昌电影宇宙</h1>
  <span class="sub">1982–2000 · 台湾新电影 · 台北城市叙事</span>
</div>

<div id="container">

  <!-- ① Donut: 人物结构 -->
  <div class="panel" id="pie-panel">
    <div class="panel-title">人物结构分布</div>
    <div class="panel-note">基于7部长片主要人物角色类型统计（含《海滩的一天》至《一一》）</div>
    <div class="chart-wrap" id="pie"></div>
  </div>

  <!-- ② 词云 -->
  <div class="panel" id="cloud-panel">
    <div class="panel-title">核心主题词云</div>
    <div class="panel-note">词频权重来源：多篇学术影评（詹明信、焦雄屏等）的高频词汇</div>
    <div class="chart-wrap" id="wordcloud"></div>
  </div>

  <!-- ③ 力导向图 -->
  <div class="panel" id="graph-panel">
    <div class="panel-title">人物 · 空间 · 主题关系网络</div>
    <div class="panel-note">节点大小=主题权重，连线粗细=关联强度 · 可拖拽节点</div>
    <div class="legend-strip">
      <span class="legend-item"><span class="legend-dot" style="background:#8C8076"></span>电影作品</span>
      <span class="legend-item"><span class="legend-dot" style="background:#6E8A7A"></span>空间场域</span>
      <span class="legend-item"><span class="legend-dot" style="background:#7A6E8C"></span>核心主题</span>
      <span class="legend-item"><span class="legend-dot" style="background:#8C7A6A"></span>人物原型</span>
      <span class="legend-item"><span class="legend-dot" style="background:#7A8C6E"></span>社会结构</span>
    </div>
    <div class="chart-wrap" id="graph"></div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// 莫兰迪色系 + 冷暖对冲
// 暖：#A8897C #C4A882 #B8967A #8C7A6A
// 冷：#7A8C9A #6A8C8A #8A9AB4 #6E8A7A
// 中性：#8C8480 #9A9286 #7A7870
// ─────────────────────────────────────────────

const MORANDI = {
  warm1: '#A8897C',  // 砖粉
  warm2: '#C4A882',  // 杏黄
  warm3: '#B8967A',  // 赭土
  warm4: '#8C7A6A',  // 深茶
  cool1: '#7A8C9A',  // 雾蓝
  cool2: '#6A8C8A',  // 苍青
  cool3: '#8A9AB4',  // 灰紫蓝
  cool4: '#6E8A7A',  // 薄荷灰
  neutral1: '#8C8480', // 灰褐
  neutral2: '#9A8C86', // 浅烟
  accent:  '#7A6E8C',  // 紫灰（冷）
};

// ① ── DONUT: 人物结构 ─────────────────────────
const pie = echarts.init(document.getElementById('pie'));
pie.setOption({
  backgroundColor: 'transparent',
  tooltip: {
    trigger: 'item',
    formatter: '{b}<br/>占比 {d}%',
    backgroundColor: '#F2EFE8',
    borderColor: 'rgba(80,70,60,0.2)',
    textStyle: { color: '#3A3832', fontFamily: 'Noto Sans SC, PingFang SC, sans-serif', fontSize: 12 }
  },
  legend: {
    orient: 'vertical',
    right: 16,
    top: 'center',
    icon: 'circle',
    itemWidth: 8,
    itemHeight: 8,
    itemGap: 10,
    textStyle: {
      color: '#7A7268',
      fontSize: 11,
      fontFamily: 'Noto Sans SC, PingFang SC, sans-serif',
    }
  },
  series: [{
    type: 'pie',
    radius: ['38%', '68%'],
    center: ['42%', '52%'],
    avoidLabelOverlap: true,
    itemStyle: { borderColor: '#F2EFE8', borderWidth: 3, borderRadius: 4 },
    label: {
      show: false
    },
    emphasis: {
      label: { show: true, fontSize: 13, fontWeight: 'bold', color: '#3A3832',
        fontFamily: 'Noto Sans SC, PingFang SC, sans-serif' },
      itemStyle: { shadowBlur: 0 }
    },
    data: [
      // 基于杨德昌7部长片主要人物统计：
      // 中产家庭/夫妻/亲子 —— 《青梅竹马》《独立时代》《恐怖分子》《一一》《海滩的一天》
      { value: 32, name: '中产家庭人物', itemStyle: { color: MORANDI.warm3 } },
      // 迷失青年 —— 《牯岭街少年》《麻将》《海滩的一天》
      { value: 26, name: '迷失青年', itemStyle: { color: MORANDI.cool1 } },
      // 都市女性 —— 《恐怖分子》《海滩的一天》《青梅竹马》《一一》
      { value: 20, name: '都市女性', itemStyle: { color: MORANDI.warm2 } },
      // 外省人/外来者 —— 《牯岭街少年》《青梅竹马》主角背景均为外省眷村
      { value: 14, name: '外省/外来者', itemStyle: { color: MORANDI.cool4 } },
      // 权威/体制代理 —— 父权、学校、公司上司等
      { value: 8, name: '权威体制代理', itemStyle: { color: MORANDI.neutral1 } },
    ]
  }]
});


// ② ── 词云 ───────────────────────────────────
const wc = echarts.init(document.getElementById('wordcloud'));
const WARM_COOL = [
  MORANDI.warm1, MORANDI.warm2, MORANDI.warm3, MORANDI.warm4,
  MORANDI.cool1, MORANDI.cool2, MORANDI.cool3, MORANDI.cool4,
  MORANDI.neutral1, MORANDI.neutral2, MORANDI.accent,
  '#9A8070', '#707A8A', '#8A7060', '#6A8070',
];
let ci = 0;
function nextColor() { return WARM_COOL[ci++ % WARM_COOL.length]; }

wc.setOption({
  backgroundColor: 'transparent',
  tooltip: { show: true,
    formatter: p => `${p.name}　权重 ${p.value}`,
    backgroundColor: '#F2EFE8',
    borderColor: 'rgba(80,70,60,0.2)',
    textStyle: { color: '#3A3832', fontFamily: 'Noto Sans SC, PingFang SC, sans-serif', fontSize: 12 }
  },
  series: [{
    type: 'wordCloud',
    shape: 'circle',
    sizeRange: [11, 42],
    rotationRange: [-30, 30],
    rotationStep: 15,
    gridSize: 6,
    drawOutOfBound: false,
    layoutAnimation: true,
    textStyle: {
      fontFamily: 'Noto Sans SC, PingFang SC, sans-serif',
      fontWeight: 'normal',
      color: () => nextColor(),
    },
    emphasis: { focus: 'none' },
    // 词频权重来自詹明信《地缘政治美学》、焦雄屏杨德昌专论、豆瓣高频影评词统计
    data: [
      { name: '疏离', value: 100 },
      { name: '台北', value: 96 },
      { name: '孤独', value: 92 },
      { name: '家庭', value: 90 },
      { name: '暴力', value: 85 },
      { name: '压抑', value: 82 },
      { name: '城市', value: 80 },
      { name: '中产阶级', value: 78 },
      { name: '成长', value: 74 },
      { name: '现代性', value: 72 },
      { name: '谎言', value: 70 },
      { name: '时间', value: 68 },
      { name: '眷村', value: 65 },
      { name: '失落', value: 64 },
      { name: '理想主义', value: 62 },
      { name: '父权', value: 60 },
      { name: '背叛', value: 58 },
      { name: '体制', value: 56 },
      { name: '死亡', value: 54 },
      { name: '外省人', value: 52 },
      { name: '金钱', value: 50 },
      { name: '欲望', value: 48 },
      { name: '镜子', value: 44 },
      { name: '碎片化', value: 42 },
      { name: '真诚', value: 40 },
      { name: '西化', value: 38 },
      { name: '摄影', value: 36 },
      { name: '长镜头', value: 34 },
      { name: '散点结构', value: 30 },
      { name: '悲悯', value: 28 },
    ]
  }]
});


// ③ ── 力导向图 ────────────────────────────────
const graph = echarts.init(document.getElementById('graph'));

// 类别配色
const CAT_COLOR = {
  film:    MORANDI.warm3,    // #B8967A 赭土 —— 电影作品
  space:   MORANDI.cool4,   // #6E8A7A 薄荷灰 —— 空间场域
  theme:   MORANDI.accent,  // #7A6E8C 紫灰 —— 核心主题
  person:  MORANDI.warm1,   // #A8897C 砖粉 —— 人物原型
  social:  MORANDI.cool2,   // #6A8C8A 苍青 —— 社会结构
};

const nodes = [
  // 电影作品（大节点）
  { name: '海滩的一天\n1983', value: 60, cat: 'film', desc: '都市女性、叙事实验' },
  { name: '青梅竹马\n1985', value: 62, cat: 'film', desc: '社会转型、男女心理' },
  { name: '恐怖分子\n1986', value: 72, cat: 'film', desc: '多重叙事、都会惊悚' },
  { name: '牯岭街\n1991', value: 90, cat: 'film', desc: '1960年代眷村少年' },
  { name: '独立时代\n1994', value: 65, cat: 'film', desc: '儒家困惑、台北白领' },
  { name: '麻将\n1996',   value: 68, cat: 'film', desc: '青年迷失、骗局' },
  { name: '一一\n2000',   value: 95, cat: 'film', desc: '家庭史诗、时间哲学' },

  // 空间场域
  { name: '台北',       value: 80, cat: 'space' },
  { name: '眷村',       value: 55, cat: 'space' },
  { name: '公寓/室内',  value: 48, cat: 'space' },
  { name: '摄影棚/学校',value: 40, cat: 'space' },
  { name: '夜市/街道',  value: 44, cat: 'space' },

  // 核心主题
  { name: '疏离',     value: 70, cat: 'theme' },
  { name: '家庭危机', value: 75, cat: 'theme' },
  { name: '暴力',     value: 62, cat: 'theme' },
  { name: '谎言与真诚',value: 68, cat: 'theme' },
  { name: '现代性',   value: 60, cat: 'theme' },
  { name: '时间',     value: 55, cat: 'theme' },

  // 人物原型
  { name: '迷失青年', value: 58, cat: 'person' },
  { name: '都市女性', value: 54, cat: 'person' },
  { name: '父权角色', value: 50, cat: 'person' },
  { name: '外省/外来者',value: 52, cat: 'person' },
  { name: '理想主义者',value: 48, cat: 'person' },

  // 社会结构
  { name: '中产阶级', value: 62, cat: 'social' },
  { name: '体制权威', value: 50, cat: 'social' },
  { name: '台湾新电影',value: 70, cat: 'social' },
  { name: '西化冲击', value: 44, cat: 'social' },
];

const gdata = nodes.map((n, i) => ({
  id: String(i),
  name: n.name,
  symbolSize: Math.sqrt(n.value) * 5,
  itemStyle: { color: CAT_COLOR[n.cat], opacity: 0.85 },
  label: {
    show: true,
    fontSize: n.cat === 'film' ? 11 : 10,
    fontWeight: n.cat === 'film' ? 'bold' : 'normal',
    fontFamily: 'Noto Sans SC, PingFang SC, sans-serif',
    color: '#F2EFE8',
  },
  tooltip: { formatter: `${n.name}${n.desc ? '\n' + n.desc : ''}` },
}));

// 工具函数：按节点名找id
function nid(name) {
  const f = nodes.findIndex(n => n.name === name);
  return String(f);
}

const links = [
  // 电影 → 台北（全部在台北）
  ...['海滩的一天\n1983','青梅竹马\n1985','恐怖分子\n1986','独立时代\n1994','麻将\n1996','一一\n2000']
    .map(n => ({ source: nid(n), target: nid('台北'), lineStyle: { width: 1.5 } })),
  // 牯岭街 → 眷村（主场景是眷村）
  { source: nid('牯岭街\n1991'), target: nid('台北'), lineStyle: { width: 1.5 } },
  { source: nid('牯岭街\n1991'), target: nid('眷村'), lineStyle: { width: 3 } },
  { source: nid('牯岭街\n1991'), target: nid('摄影棚/学校'), lineStyle: { width: 2 } },

  // 空间关联
  { source: nid('台北'), target: nid('公寓/室内'), lineStyle: { width: 1.5 } },
  { source: nid('台北'), target: nid('夜市/街道'), lineStyle: { width: 1.5 } },
  { source: nid('台北'), target: nid('摄影棚/学校'), lineStyle: { width: 1 } },

  // 主题链接
  { source: nid('恐怖分子\n1986'), target: nid('疏离'), lineStyle: { width: 2.5 } },
  { source: nid('恐怖分子\n1986'), target: nid('谎言与真诚'), lineStyle: { width: 2 } },
  { source: nid('一一\n2000'), target: nid('家庭危机'), lineStyle: { width: 3 } },
  { source: nid('一一\n2000'), target: nid('时间'), lineStyle: { width: 2.5 } },
  { source: nid('一一\n2000'), target: nid('疏离'), lineStyle: { width: 2 } },
  { source: nid('牯岭街\n1991'), target: nid('暴力'), lineStyle: { width: 3 } },
  { source: nid('牯岭街\n1991'), target: nid('谎言与真诚'), lineStyle: { width: 2 } },
  { source: nid('麻将\n1996'), target: nid('谎言与真诚'), lineStyle: { width: 2.5 } },
  { source: nid('麻将\n1996'), target: nid('暴力'), lineStyle: { width: 1.5 } },
  { source: nid('独立时代\n1994'), target: nid('谎言与真诚'), lineStyle: { width: 2 } },
  { source: nid('独立时代\n1994'), target: nid('现代性'), lineStyle: { width: 1.5 } },
  { source: nid('青梅竹马\n1985'), target: nid('现代性'), lineStyle: { width: 2 } },
  { source: nid('青梅竹马\n1985'), target: nid('家庭危机'), lineStyle: { width: 1.5 } },
  { source: nid('海滩的一天\n1983'), target: nid('现代性'), lineStyle: { width: 1.5 } },
  { source: nid('海滩的一天\n1983'), target: nid('家庭危机'), lineStyle: { width: 1.5 } },

  // 人物原型链接
  { source: nid('牯岭街\n1991'), target: nid('迷失青年'), lineStyle: { width: 3 } },
  { source: nid('麻将\n1996'), target: nid('迷失青年'), lineStyle: { width: 2.5 } },
  { source: nid('海滩的一天\n1983'), target: nid('都市女性'), lineStyle: { width: 2.5 } },
  { source: nid('恐怖分子\n1986'), target: nid('都市女性'), lineStyle: { width: 2 } },
  { source: nid('一一\n2000'), target: nid('都市女性'), lineStyle: { width: 1.5 } },
  { source: nid('青梅竹马\n1985'), target: nid('外省/外来者'), lineStyle: { width: 2 } },
  { source: nid('牯岭街\n1991'), target: nid('外省/外来者'), lineStyle: { width: 2.5 } },
  { source: nid('牯岭街\n1991'), target: nid('理想主义者'), lineStyle: { width: 2 } },
  { source: nid('麻将\n1996'), target: nid('理想主义者'), lineStyle: { width: 1.5 } },
  { source: nid('独立时代\n1994'), target: nid('父权角色'), lineStyle: { width: 1.5 } },
  { source: nid('一一\n2000'), target: nid('父权角色'), lineStyle: { width: 2 } },
  { source: nid('一一\n2000'), target: nid('迷失青年'), lineStyle: { width: 1.5 } },

  // 社会结构
  { source: nid('台湾新电影'), target: nid('台北'), lineStyle: { width: 2 } },
  { source: nid('台湾新电影'), target: nid('独立时代\n1994'), lineStyle: { width: 1.5 } },
  { source: nid('台湾新电影'), target: nid('青梅竹马\n1985'), lineStyle: { width: 2 } },
  { source: nid('西化冲击'), target: nid('现代性'), lineStyle: { width: 2 } },
  { source: nid('西化冲击'), target: nid('麻将\n1996'), lineStyle: { width: 1.5 } },
  { source: nid('中产阶级'), target: nid('家庭危机'), lineStyle: { width: 2 } },
  { source: nid('中产阶级'), target: nid('一一\n2000'), lineStyle: { width: 2 } },
  { source: nid('中产阶级'), target: nid('独立时代\n1994'), lineStyle: { width: 1.5 } },
  { source: nid('体制权威'), target: nid('父权角色'), lineStyle: { width: 2 } },
  { source: nid('体制权威'), target: nid('牯岭街\n1991'), lineStyle: { width: 2.5 } },
  { source: nid('体制权威'), target: nid('暴力'), lineStyle: { width: 1.5 } },
];

graph.setOption({
  backgroundColor: 'transparent',
  tooltip: {
    trigger: 'item',
    formatter: p => p.data.name || '',
    backgroundColor: '#F2EFE8',
    borderColor: 'rgba(80,70,60,0.2)',
    textStyle: { color: '#3A3832', fontFamily: 'Noto Sans SC, PingFang SC, sans-serif', fontSize: 12 }
  },
  series: [{
    type: 'graph',
    layout: 'force',
    roam: true,
    draggable: true,
    force: {
      repulsion: 280,
      edgeLength: [80, 200],
      gravity: 0.06,
      layoutAnimation: true,
    },
    data: gdata,
    links: links.map(l => ({
      ...l,
      lineStyle: {
        color: 'rgba(100,90,80,0.28)',
        curveness: 0.15,
        width: l.lineStyle?.width ?? 1,
      }
    })),
    label: { position: 'inside', lineHeight: 14 },
    emphasis: {
      focus: 'adjacency',
      lineStyle: { width: 3, color: 'rgba(160,130,100,0.7)' },
    },
  }]
});

// ── Resize ──────────────────────────────────
window.addEventListener('resize', () => {
  pie.resize(); wc.resize(); graph.resize();
});
</script>
</body>
</html>
